<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Calorie Counter — Daily Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
   
</head>
<body class="bg-gradient-to-br from-rose-50 via-white to-sky-50 min-h-screen flex items-center justify-center p-6 transition-colors duration-500">
    
    <main class="w-full max-w-3xl bg-white/90 backdrop-blur rounded-2xl shadow-2xl p-6 md:p-8">
        <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-800">Calorie Counter</h1>
                <p class="text-sm text-slate-500">A playful daily tracker with smart defaults</p>
            </div>

            <div class="flex items-center gap-6">
                <div class="text-right">
                    <div id="totalCalories" class="text-4xl font-black text-rose-600">0</div>
                    <div class="text-xs font-medium uppercase tracking-wider text-slate-400">kcal today</div>
                </div>

                <div class="relative w-20 h-20">
                    <svg id="progressRing" viewBox="0 0 36 36" class="w-20 h-20">
                        <path class="ring-bg" d="M18 2.0845
                          a 15.9155 15.9155 0 0 1 0 31.831
                          a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="ringProgress" class="ring-fg" d="M18 2.0845
                          a 15.9155 15.9155 0 0 1 0 31.831
                          a 15.9155 15.9155 0 0 1 0 -31.831" stroke-dasharray="0 100" />
                    </svg>
                </div>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="md:col-span-3">
                <form id="foodForm" class="flex flex-col sm:flex-row gap-3">
                    <input id="foodName" required type="text" placeholder="Food name e.g. Banana"
                           class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-rose-100 transition-all" />
                    <input id="foodCalories" type="number" min="0" placeholder="Calories"
                           class="w-full sm:w-32 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-rose-100 transition-all" />
                    <button id="addBtn" type="submit"
                            class="px-6 py-3 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 active:scale-95 transition-all shadow-lg shadow-rose-200">
                        Add
                    </button>
                </form>
                <div class="mt-3 text-[11px] font-medium uppercase tracking-wide text-slate-400 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-rose-400 animate-pulse"></span>
                    Leave calories blank to fetch an estimate
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <button id="resetBtn" class="w-full px-4 py-2.5 text-sm font-semibold bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors">Reset Day</button>
                <button id="exportBtn" class="w-full px-4 py-2.5 text-sm font-semibold bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 transition-colors">Export JSON</button>
                <button id="themeToggle" class="w-full px-4 py-2.5 text-sm font-semibold bg-sky-50 text-sky-600 rounded-lg hover:bg-sky-100 transition-colors">Toggle Theme</button>
            </div>
        </section>

        <section class="min-h-[200px]">
            <ul id="foodList" class="space-y-4">
                </ul>
        </section>

        <footer class="mt-10 pt-6 border-t border-slate-100 text-[11px] font-medium text-slate-400 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m14.462 2.08c.04.285.06.576.06.872 0 4.42-3.582 8-8 8s-8-3.582-8-8c0-.296.02-.587.06-.872m14.462 0A12.02 12.02 0 003 9.712M21 9.712A12.02 12.02 0 0112 21.288a12.02 12.02 0 01-9-11.576"></path></svg>
                ENCRYPTED COOKIE BACKUP ACTIVE
            </div>
            <div class="flex items-center gap-3">
                <button id="clearCookies" class="text-rose-500 hover:text-rose-700 uppercase tracking-widest">Clear cookies</button>
                <span class="text-slate-200">|</span>
                <span id="lastSaved" class="uppercase tracking-widest">NEVER SAVED</span>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
